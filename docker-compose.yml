services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: auction_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://auction_user:auction_password@postgres:5432/auction_db
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - auction_net
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: auction_migrate
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    environment:
      DATABASE_URL: postgresql://auction_user:auction_password@postgres:5432/auction_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auction_net
    restart: "no"

  postgres:
    image: postgres:16
    container_name: auction_postgres
    environment:
      POSTGRES_USER: auction_user
      POSTGRES_PASSWORD: auction_password
      POSTGRES_DB: auction_db
    ports:
      - "5434:5432"
    volumes:
      - auction_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction_user -d auction_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - auction_net

  redis:
    image: redis:7
    container_name: auction_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - auction_net

  prometheus:
    image: prom/prometheus:latest
    container_name: auction_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - auction_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: auction_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - auction_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - auction_net
    restart: unless-stopped

volumes:
  auction_postgres_data:
  auction_grafana_data:

networks:
  auction_net:
    driver: bridge